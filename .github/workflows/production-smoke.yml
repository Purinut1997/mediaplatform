name: Production Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

jobs:
  verify-production:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run smoke
